    <!-- סקריפט לשליטה במודל -->
    <script>
        function openModal() {
            const modal = document.getElementById('learningModal');
            modal.classList.remove('hidden');
            document.body.style.overflow = 'hidden'; // מניעת גלילה של הרקע
        }

        function closeModal() {
            const modal = document.getElementById('learningModal');
            modal.classList.add('hidden');
            document.body.style.overflow = ''; // החזרת הגלילה
        }

        function openLeyaModal() {
            const modal = document.getElementById('leyaModal');
            modal.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeLeyaModal() {
            const modal = document.getElementById('leyaModal');
            modal.classList.add('hidden');
            document.body.style.overflow = '';
        }

        function openGayaModal() {
            const modal = document.getElementById('gayaModal');
            modal.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeGayaModal() {
            const modal = document.getElementById('gayaModal');
            modal.classList.add('hidden');
            document.body.style.overflow = '';
        }

        // סגירת החלונות בלחיצה מחוץ לתוכן שלהם
        window.addEventListener('click', function(event) {
            const learningModal = document.getElementById('learningModal');
            const leyaModal = document.getElementById('leyaModal');
            const gayaModal = document.getElementById('gayaModal');
            if (event.target === learningModal) {
                closeModal();
            }
            if (event.target === leyaModal) {
                closeLeyaModal();
            }
            if (event.target === gayaModal) {
                closeGayaModal();
            }
        });
    </script>
